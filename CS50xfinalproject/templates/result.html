{% extends "layout.html" %}

{% block title %}
    Result
{% endblock %}

{% block main %}
    <div class="container mt-4">
        <h2 class="mb-4 text-center">Your Optimized Route</h2>

        <div class="alert alert-bg-primary text-center shadow-sm" role="alert">
            <p class="mb-0">Estimated cost: <strong>{{ best_route.cost }}NTD</strong></p>
        </div>

        <!-- Show route -->
        <div class="row mt-4">
            <div class="col-md-5 mb-4">
                <ol class="list-group list-group-numbered shadow-sm">
                    {% for bar in best_route.route %}
                        <li class="list-group-item d-flex justify-content-between align-items-start py-3">
                            <div class="ms-2 me-auto">
                                <div class="fw-bold fs-5">{{ bar.name }}</div>
                            </div>
                        </li>
                    {% endfor %}
                </ol>
            </div>

            <!-- Show google map -->
            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-body p-1">
                        <div id="map" style="height: 500px; width: 100%; border-radius: 4px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Please refer to the documentation, especially the first one:
        // https://developers.google.com/maps/documentation/javascript/examples/directions-simple
        // https://developers.google.com/maps/documentation/javascript/libraries?hl=en#javascript
        // https://developers.google.com/maps/documentation/directions/get-directions?hl=en

        function initMap() {
            // Convert Python dictionary into a JSON array
            const RouteData = {{ best_route.route | tojson }};
            if (RouteData.length < 2) return;

            // Set center to Tainan railway station front entrance
            const map = new google.maps.Map(document.getElementById("map"), {
                zoom: 14,
                center: { lat: 22.997226, lng: 120.212462 },
            });
            
            const directionsService = new google.maps.DirectionsService();
            const directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                suppressMarkers: false
            });
            
            // Extract the mid stops and add them to array.
            const midPoints = [];
            for (let i = 1; i < RouteData.length - 1; i++) 
            {
                midPoints.push({
                    location: { lat: parseFloat(RouteData[i].latitude), lng: parseFloat(RouteData[i].longitude) }, 
                    stopover: true
                });
            }

            const request = 
            {
                origin: { lat: parseFloat(RouteData[0].latitude), lng: parseFloat(RouteData[0].longitude) },
                destination: { lat: parseFloat(RouteData[RouteData.length - 1].latitude), lng: parseFloat(RouteData[RouteData.length - 1].longitude) },
                waypoints: midPoints,
                optimizeWaypoints: false, 
                travelMode: 'WALKING'
            };

            directionsService.route(request, function(result) {
                directionsRenderer.setDirections(result);
            });
        }
    </script>

    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCFA2q-Q5lbmWWWqcT0jjHuMt0Gw68q4KA&callback=initMap"></script>
{% endblock %}
